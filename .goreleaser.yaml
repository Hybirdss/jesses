# GoReleaser configuration for jesses.
#
# Reproducibility requirements (per ADR 0001 and CONTRIBUTING.md §Bit-exact):
#   - `-trimpath` strips local paths from the binary
#   - `-buildid=` empties the GNU build ID header
#   - `CGO_ENABLED=0` forces pure-Go build; no libc drift across runners
#   - `mod_timestamp` uses the commit timestamp, not the build time
#
# Signing (per ADR 0002 and release.yml):
#   - cosign v3 keyless (Fulcio OIDC identity, Rekor transparency log)
#   - `--bundle` output form (v3 standard)
#
# SBOM:
#   - syft emits both SPDX and CycloneDX alongside every artifact

version: 2

project_name: jesses

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: jesses
    main: ./cmd/jesses
    binary: jesses
    # `production` tag strips rekor.FakeClient, ots.FakeClient, and
    # the --fake-rekor CLI helper from the binary. A released binary
    # cannot silently talk to an in-memory transparency log — the
    # trust model holds by construction, not by policy.
    tags:
      - production
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X github.com/Hybirdss/jesses/internal/version.Version={{.Version}}
      - -X github.com/Hybirdss/jesses/internal/version.Commit={{.Commit}}
      - -X github.com/Hybirdss/jesses/internal/version.Date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: jesses
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - SPEC.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Security
      regexp: "^.*sec[(\\w)]*:+.*$"
      order: 2
    - title: Other
      order: 999

sboms:
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    args: ["scan", "$artifact", "--output", "spdx-json=$document"]
  - id: cyclonedx
    artifacts: archive
    documents:
      - "${artifact}.cyclonedx.json"
    cmd: syft
    args: ["scan", "$artifact", "--output", "cyclonedx-json=$document"]

signs:
  - id: cosign-checksums
    cmd: cosign
    stdin: "{{ .Env.COSIGN_PASSWORD }}"
    args:
      - sign-blob
      - --bundle=${artifact}.cosign.bundle
      - --yes
      - ${artifact}
    artifacts: checksum
    output: true
  - id: cosign-archives
    cmd: cosign
    args:
      - sign-blob
      - --bundle=${artifact}.cosign.bundle
      - --yes
      - ${artifact}
    artifacts: archive
    output: true

release:
  github:
    owner: Hybirdss
    name: jesses
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## jesses {{ .Version }}

    Signed with cosign (keyless via Fulcio + Rekor) and accompanied by SLSA
    Build Level 3 provenance (see `multiple.intoto.jsonl`). Verify with:

    ```
    cosign verify-blob \
      --bundle jesses_{{ .Version }}_linux_amd64.tar.gz.cosign.bundle \
      --certificate-identity-regexp "^https://github.com/Hybirdss/jesses/" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      jesses_{{ .Version }}_linux_amd64.tar.gz

    slsa-verifier verify-artifact \
      --provenance-path multiple.intoto.jsonl \
      --source-uri github.com/Hybirdss/jesses \
      --source-tag v{{ .Version }} \
      jesses_{{ .Version }}_linux_amd64.tar.gz
    ```
  footer: |
    ---
    Per `GOVERNANCE.md`, `jesses` is MIT-licensed in perpetuity.
    The transition to Commonhaus Foundation stewardship is scheduled for v0.2.
