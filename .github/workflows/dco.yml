name: DCO

# Blocks pull requests whose commits do not carry `Signed-off-by:`.
# jesses uses the Developer Certificate of Origin; see CONTRIBUTING.md.

on:
  pull_request:
    branches: [main]
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dco:
    name: verify sign-off
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: DCO check
        uses: tim-actions/dco@v1.1.0
